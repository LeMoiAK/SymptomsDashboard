# CONNECTIONS
listen_addresses = '*'
max_connections = 100

# MEMORY (safe dev values, not maxing your system)
shared_buffers = 4GB
work_mem = 32MB
maintenance_work_mem = 512MB
effective_cache_size = 12GB

# LOGGING
logging_collector = on
log_connections = on
log_disconnections = on
log_min_duration_statement = 200  # log slow queries

# SECURITY
password_encryption = scram-sha-256

# TIMEOUTS
statement_timeout = 15000
idle_in_transaction_session_timeout = 15000