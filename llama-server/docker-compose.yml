services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama_server
    restart: unless-stopped

    ports:
      - "8686:8686"

    volumes:
      - ./models:/models

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    command: >
      -m /models/qwen2.5-14b-instruct-q8.gguf
      --host 0.0.0.0
      --port 8686
      --ctx-size 8192
      --n-gpu-layers 999
      --batch-size 1024
      --ubatch-size 512
      --threads 12
      --parallel 1
      --mlock
      --cont-batching
      --flash-attn 'on'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s